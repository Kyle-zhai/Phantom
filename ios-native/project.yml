name: Phantom
options:
  bundleIdPrefix: com.phantom
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES
  configs:
    Debug:
      baseConfiguration: Config/Debug.xcconfig
    Release:
      baseConfiguration: Config/Release.xcconfig

targets:
  Phantom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Phantom
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Phantom/Resources
      - path: Phantom/Phantom.storekit
    dependencies:
      - sdk: MessageUI.framework
      - sdk: StoreKit.framework
      - sdk: UserNotifications.framework
      - sdk: Vision.framework
      - sdk: PhotosUI.framework
      - package: SVGView
        product: SVGView
    info:
      path: Phantom/Info.plist
      properties:
        CFBundleDisplayName: Phantom
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        UIUserInterfaceStyle: Light
        NSUserTrackingUsageDescription: "We never track you. This permission is requested only to comply with App Store policies — Phantom does not perform any cross-app tracking."
        PHANTOM_API_BASE: $(PHANTOM_API_BASE)
        PLAID_ENVIRONMENT: $(PLAID_ENVIRONMENT)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phantom.app
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: Phantom
        PHANTOM_API_BASE: "http://localhost:3000"
        PLAID_ENVIRONMENT: "sandbox"

packages:
  SVGView:
    url: https://github.com/exyte/SVGView
    from: "1.0.6"

schemes:
  Phantom:
    build:
      targets:
        Phantom: all
    run:
      config: Debug
      storeKitConfiguration: Phantom/Phantom.storekit
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
