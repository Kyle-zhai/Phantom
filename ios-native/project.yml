name: Phantom
options:
  bundleIdPrefix: com.phantom
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.1.1"
    CURRENT_PROJECT_VERSION: "4"
    DEVELOPMENT_TEAM: "7N337R6J9M"
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_PREVIEWS: YES
  configs:
    Debug:
      baseConfiguration: Config/Debug.xcconfig
    Release:
      baseConfiguration: Config/Release.xcconfig

targets:
  Phantom:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Phantom
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Phantom/Resources
      - path: Phantom/Phantom.storekit
    dependencies:
      - sdk: MessageUI.framework
      - sdk: StoreKit.framework
      - sdk: UserNotifications.framework
      - sdk: Vision.framework
      - sdk: PhotosUI.framework
      - sdk: WidgetKit.framework
      - package: SVGView
        product: SVGView
      - target: PhantomWidget
    entitlements:
      path: Phantom/Phantom.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yinanzhai.phantom
    info:
      path: Phantom/Info.plist
      properties:
        CFBundleDisplayName: Phantom
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: ""
          UIImageRespectsSafeAreaInsets: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        UIStatusBarStyle: UIStatusBarStyleDarkContent
        UIUserInterfaceStyle: Light
        # NSUserTrackingUsageDescription intentionally NOT set.
        # Phantom performs zero cross-app tracking — declaring this key
        # would force Apple's "App Tracking Transparency" prompt and
        # require tracking disclosure in the App Privacy section, which
        # would contradict the "Nothing leaves your phone" promise.
        # No backend = no PHANTOM_API_BASE / PLAID_ENVIRONMENT shipped.
        # All processing is on-device (Vision OCR, CoreML classifier,
        # SwiftData persistence). Re-add these keys + xcconfig values
        # if a real backend integration lands.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yinanzhai.phantom
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        # iPhone only ("1"). Setting "1,2" enables iPad support but Phantom's
        # UI is designed for the 390×844 iPhone viewport — App Store validation
        # requires iPad apps to support all 4 orientations for multitasking,
        # which would mean rebuilding every screen layout. iPad users can still
        # install the iPhone app and run it in scaled mode.
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: Phantom
        # PHANTOM_API_BASE / PLAID_ENVIRONMENT intentionally NOT set here.
        # Setting them in the target's base settings overrides the per-config
        # xcconfig values and would ship localhost:3000 to App Store. The
        # xcconfigs (Config/Debug.xcconfig / Config/Release.xcconfig) set the
        # right value per configuration.
        # NSAppTransportSecurity / NSAllowsLocalNetworking also removed —
        # the only API call (POST /account/delete) is dead code because no
        # code path ever populates Keychain.userId. Adding it back is a
        # one-line Info.plist change if a real backend integration lands.

  PhantomTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhantomTests
    dependencies:
      - target: Phantom
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.yinanzhai.phantom.tests
        # xcodegen auto-wires TEST_HOST/BUNDLE_LOADER to the Phantom app because
        # this target depends on it — needed for `@testable import Phantom`.

  PhantomWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PhantomWidget
      - path: Phantom/Services/SharedStore.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
    entitlements:
      path: PhantomWidget/PhantomWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.yinanzhai.phantom
    info:
      path: PhantomWidget/Info.plist
      properties:
        CFBundleDisplayName: Phantom
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yinanzhai.phantom.widget
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"

packages:
  SVGView:
    url: https://github.com/exyte/SVGView
    from: "1.0.6"

schemes:
  Phantom:
    build:
      targets:
        Phantom: all
    run:
      config: Debug
      storeKitConfiguration: Phantom/Phantom.storekit
    test:
      config: Debug
      targets:
        - PhantomTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
